name: Build and Deploy Management Hub to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ssh-management-hub-fastapi

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"
      - run: uv sync --frozen --group dev
      - run: uv run pytest tests/ -v
        env:
          DB_BACKEND: postgres
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: test
          JWT_SECRET_KEY: test_secret_key_for_ci

      # 프로덕션 의존성만으로 앱 import 가능 여부 검증
      - run: uv sync --frozen --no-dev && uv run python -c "from app.main import app; print('✅ production import OK')"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=sha,format=short
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        env:
          EXPECTED_SHA: ${{ github.sha }}
          REPO_NAME: ssh-management-hub-fastAPI
          REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_ACTOR: ${{ github.actor }}
          APP_DIR: /home/ubuntu/workspace/internal.management-hub/apps/backend/ssh-management-hub-fastAPI
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: EXPECTED_SHA,REPO_NAME,REPO_OWNER,GITHUB_ACTOR,APP_DIR
          script: |
            set -eu
            python3 ~/secrets/deploy_prepare.py \
              --dir  "${APP_DIR}" \
              --repo "git@github.com:${REPO_OWNER}/${REPO_NAME}.git" \
              --sha  "${EXPECTED_SHA}" \
              --app  "management-hub"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            cd "${APP_DIR}"
            docker compose pull
            docker compose up -d --no-build --force-recreate

            CONTAINER_NAME="ssh-management-hub-fastapi-prod"
            RUNNING_SHA="$(docker inspect "${CONTAINER_NAME}" --format '{{ index .Config.Labels `org.opencontainers.image.revision` }}')"
            echo "Successfully deployed revision: ${RUNNING_SHA}"

            # nginx 리로드 (컨테이너 IP 변경 반영)
            docker exec internal-nginx nginx -s reload 2>/dev/null || true
            docker exec internal.private-hub-nginx nginx -s reload 2>/dev/null || true
            docker exec main-nginx nginx -s reload 2>/dev/null || true

            docker image prune -f
