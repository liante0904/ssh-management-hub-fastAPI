services:
  fastapi:
    image: ghcr.io/liante0904/ssh-management-hub-fastapi:latest
    container_name: ssh-management-hub-fastapi-prod
    user: "1001:1001"
    expose:
      - "8000"
    volumes:
      - .:/app
      - /home/ubuntu/logs:/host-logs:ro
      - /home/ubuntu/prod/ssh-reports-scraper/logs:/host-scraper-logs:ro
      # SSH 설정 및 키 마운트 (oci2 서버 접속용)
      - /home/ubuntu/.ssh:/home/ubuntu/.ssh:ro
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Seoul
      - DISK_CHECK_PATH=/
      - PYTHONUNBUFFERED=1
      - OCI2_SSH_HOST=${OCI2_SSH_HOST:-oci2}
      - OCI2_SSH_TIMEOUT=${OCI2_SSH_TIMEOUT:-5}
    restart: always
    networks:
      - public-net

networks:
  public-net:
    external: true
